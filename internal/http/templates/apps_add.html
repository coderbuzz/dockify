<!doctype html>
<html lang="en" data-theme="dark">
<head>{{template "head" .}}</head>
<body>
{{template "nav" .}}
<main class="container">
  <hgroup>
    <h1>Deploy App</h1>
    <p>Deploy a Docker Compose stack to a worker VM</p>
  </hgroup>

  {{if .Error}}
  <article style="color:var(--pico-color-red-500)">{{.Error}}</article>
  {{end}}

  <form hx-post="/apps/add" hx-target="body" hx-swap="outerHTML">
    <fieldset>
      <div class="grid">
        <label>
          App Name
          <input type="text" name="name" placeholder="my-web-app" required autofocus>
        </label>
        <label>
          Domain
          <input type="text" name="domain" placeholder="app.example.com" required>
        </label>
      </div>
      <div class="grid">
        <label>
          Port
          <input type="number" name="port" placeholder="3000" required>
          <small>Internal container port</small>
        </label>
        <label>
          Server
            <select name="server_id" required>
            <option value="">Select a server...</option>
            <option value="0">Auto-select (least loaded)</option>
            {{range .Servers}}
            <option value="{{.ID}}">{{.Name}} ({{.Status}})</option>
            {{end}}
          </select>
        </label>
      </div>
    </fieldset>

    <fieldset>
      <label>
        Docker Compose
        <textarea name="compose" rows="12" placeholder="version: '3'&#10;services:&#10;  web:&#10;    image: nginx:alpine&#10;    ports:&#10;      - '3000:80'" required></textarea>
      </label>
    </fieldset>

    <fieldset>
      <legend>Git (optional - for auto-deploy on push)</legend>
      <div class="grid">
        <label>
          Git Repo URL
          <input type="text" name="git_repo" placeholder="https://github.com/user/repo.git">
        </label>
        <label>
          Branch
          <input type="text" name="git_branch" value="main" placeholder="main">
        </label>
      </div>
    </fieldset>

    <button type="submit">Deploy App</button>
  </form>
</main>
{{template "scripts" .}}
</body>
</html>
