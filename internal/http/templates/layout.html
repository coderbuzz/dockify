{{define "head"}}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<base href="{{.BasePath}}">
<title>{{.Title}} - Dockify</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<style>
:root {
  --bg: #f5f5f5;
  --bg-elevated: #fff;
  --bg-card: #fff;
  --border: #d4d4d4;
  --border-hover: #b0b0b0;
  --text: #1a1a1a;
  --text-muted: #666;
  --text-dim: #999;
  --accent: #555;
  --accent-hover: #333;
  --green: #2d7a3a;
  --red: #9a2a2a;
  --yellow: #8a7420;
  --orange: #8a6020;
  --blue: #3a6bbb;
  --link: #2563eb;
  --link-hover: #1d4ed8;
}
html.dark {
  --bg: #0d0d0d;
  --bg-elevated: #141414;
  --bg-card: #1a1a1a;
  --border: #2a2a2a;
  --border-hover: #3a3a3a;
  --text: #cfcecd;
  --text-muted: #888;
  --text-dim: #555;
  --accent: #7c7c7c;
  --accent-hover: #aaa;
  --green: #3d8b4a;
  --red: #b33a3a;
  --yellow: #b8942e;
  --orange: #b8702e;
  --blue: #4a7bbb;
  --link: #8ab4f8;
  --link-hover: #b8d7ff;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Berkeley Mono", "IBM Plex Mono", ui-monospace, "SF Mono", "Cascadia Code", "Fira Code", monospace;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--link); text-decoration: none; }
a:hover { color: var(--link-hover); }
h1, h2, h3, h4 { font-weight: 600; margin: 0 0 0.4em; color: var(--text); }
h1 { font-size: 1.35em; }
h2 { font-size: 1.1em; color: var(--text-muted); font-weight: 500; margin-top: 2em; }
hgroup p { color: var(--text-muted); margin: -0.2em 0 1em; }

/* Nav */
.top-nav {
  display: flex;
  align-items: center;
  gap: 1.5em;
  padding: 0.55em 1.5em;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
  flex-wrap: wrap;
}
.top-nav .logo { font-weight: 600; font-size: 1em; color: var(--text); letter-spacing: -0.01em; }
.top-nav .logo:hover { color: var(--link); }
.top-nav .nav-links { display: flex; gap: 0.3em; margin-left: auto; align-items: center; }
.top-nav .nav-links a {
  padding: 0.3em 0.65em;
  border-radius: 4px;
  font-size: 0.88em;
  color: var(--text-muted);
  transition: color 0.15s, background 0.15s;
}
.top-nav .nav-links a:hover { color: var(--text); background: var(--border); }

/* Theme toggle */
.theme-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.15em 0.45em;
  cursor: pointer;
  font-size: 1em;
  color: var(--text-muted);
  transition: border-color 0.15s;
  line-height: 1.4;
}
.theme-btn:hover { border-color: var(--border-hover); color: var(--text); }

/* Container */
.container { max-width: 960px; margin: 0 auto; padding: 1.4em 1.5em; }

/* Cards */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1em 1.2em;
  margin-bottom: 0.8em;
  overflow: hidden;
}
.card h3 { font-size: 0.87em; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.8em; font-weight: 600; }
.card p { font-size: 0.85em; }

/* Grid */
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.8em; }
form .grid { gap: 1em; margin-bottom: 0.7em; }
.grid-fill > .card { display: flex; flex-direction: column; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8em; }

/* Buttons */
.btn, [role=button], button {
  display: inline-block;
  padding: 0.4em 0.85em;
  font-size: 0.88em;
  font-family: inherit;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  line-height: 1.45;
  text-decoration: none;
  font-weight: 500;
}
.btn:hover, [role=button]:hover, button:hover { border-color: var(--border-hover); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text-muted); }
.btn-ghost:hover { color: var(--text); }
.btn-red { color: var(--red); }
.btn-red:hover { border-color: var(--red); color: var(--red); background: transparent; }
.btn-danger { background: var(--red); color: white; border-color: var(--red); }
.btn-danger:hover { opacity: 0.85; }
.btn-icon { padding: 0.3em; line-height: 0; border-color: transparent; background: transparent; }
.btn-icon:hover { border-color: transparent; background: rgba(128,128,128,0.1); }
.btn-icon.btn-red:hover { background: rgba(220,38,38,0.1); color: var(--red); border-color: transparent; }

/* Tables */
table { width: 100%; border-collapse: collapse; }
.table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
thead th {
  text-align: left;
  padding: 0.5em 0.6em;
  border-bottom: 1px solid var(--border);
  color: var(--text-muted);
  font-weight: 500;
  font-size: 0.82em;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
tbody td { padding: 0.45em 0.6em; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:hover td { background: rgba(128,128,128,0.04); }
table a { color: var(--link); }
table a:hover { color: var(--link-hover); }

/* Form elements */
input, textarea, select {
  font-family: inherit;
  font-size: 0.95em;
  padding: 0.55em 0.7em;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  width: 100%;
  outline: none;
  transition: border-color 0.15s;
}
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
input[type=radio], input[type=checkbox] { width: auto; }
input[type=radio] { margin: 0 0.7em 0 0; vertical-align: middle; }
input[type=checkbox] { margin: 0 0.4em 0 0; vertical-align: middle; }
textarea { resize: vertical; min-height: 100px; }
label { font-size: 0.82em; color: var(--text-muted); margin-bottom: 0.7em; display: block; }
fieldset { border: none; padding: 0; margin: 0 0 1.5em; }
legend {
  font-size: 0.82em;
  color: var(--text-muted);
  margin-bottom: 0.5em;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  font-weight: 500;
}
small { font-size: 0.82em; color: var(--text-dim); display: block; margin-top: 0.35em; }
.grid label { margin-bottom: 0; }

/* Badges */
.badge {
  display: inline-block;
  padding: 0.08em 0.5em;
  border-radius: 3px;
  font-size: 0.78em;
  font-weight: 500;
}
.badge-online, .badge-running, .badge-success { background: var(--green); color: #fff; }
.badge-offline, .badge-error, .badge-failed { background: var(--red); color: #fff; }
.badge-pending, .badge-created { background: var(--text-dim); color: var(--text); }
.badge-initializing, .badge-deploying { background: var(--yellow); color: #000; }
.badge-stopped { background: var(--orange); color: #fff; }
.badge-draft { background: transparent; color: var(--text-dim); border: 1px dashed var(--border); }

/* Disabled */
.btn:disabled, .btn-danger:disabled, .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

/* Stats */
.stat { text-align: center; padding: 0.8em; }
.stat h2 { font-size: 1.6em; font-weight: 600; margin: 0; color: var(--text); }
.stat small { font-size: 0.78em; color: var(--text-muted); }

/* Breadcrumb */
.breadcrumb { display: flex; gap: 0.5em; font-size: 0.88em; color: var(--text-muted); margin-bottom: 0.8em; }
.breadcrumb a { color: var(--text-muted); }
.breadcrumb a:hover { color: var(--link); }

/* Button group */
.btn-group { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5em; margin: 1em 0; }
.btn-group-left, .btn-group-right { display: flex; gap: 0.5em; align-items: center; flex-wrap: wrap; }

/* Code blocks */
pre, code { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 0.85em; }
pre {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 0.8em;
  border-radius: 4px;
  overflow-x: auto;
  line-height: 1.45;
}

/* Log viewer */
.log-container { margin: 1em 0; }
.log-toolbar { display: flex; gap: 0.4em; margin-bottom: 0.5em; }
.log-content {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 0.6em;
  border-radius: 4px;
  max-height: 400px;
  overflow: auto;
  font-family: ui-monospace, 'SF Mono', 'Fira Code', monospace;
  font-size: 0.82em;
  line-height: 1.45;
  color: var(--text-muted);
}

/* Secret row */
.secret-row {
  display: flex;
  align-items: center;
  padding: 0.4em 0;
  border-bottom: 1px solid var(--border);
  gap: 0.5em;
}
.secret-row code { flex: 1; font-size: 0.85em; }
.secret-row .secret-val { color: var(--text-muted); font-size: 0.85em; }
.secret-row input { width: auto; min-width: 150px; padding: 0.35em 0.55em; font-size: 0.85em; }

/* Empty state */
.empty-state { text-align: center; padding: 3em 1em; color: var(--text-muted); }
.empty-state p { margin-bottom: 0.8em; }

@keyframes blink-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.dev-mock-bar {
  background: var(--yellow);
  color: #000;
  text-align: center;
  padding: 0.35em 1em;
  font-size: 0.82em;
  font-weight: 600;
  animation: blink-pulse 1.5s ease-in-out infinite;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

/* Flash messages */
.flash-banner {
  background: var(--blue);
  color: #fff;
  padding: 0.6em 1em;
  border-radius: 4px;
  margin-bottom: 1em;
  font-size: 0.85em;
  line-height: 1.4;
}

@media (max-width: 600px) {
  .container { padding: 0.8em 1em; }
  .grid { grid-template-columns: 1fr; }
  .grid-2 { grid-template-columns: 1fr; }
  .top-nav { gap: 0.6em 1em; padding: 0.55em 1em; }
  .top-nav .nav-links { gap: 0.1em; width: 100%; flex-wrap: wrap; }
  .top-nav .nav-links a { padding: 0.45em 0.5em; }
  .btn-group { flex-direction: column; align-items: stretch; }
  .btn-group-left, .btn-group-right { width: 100%; }
  .btn-group-left > *, .btn-group-right > * { flex: 1 1 auto; }
  .btn-group form { display: flex !important; }
  .btn-group form > button { width: 100%; }
  .btn, button { min-height: 40px; }
  .login-card { width: 90%; max-width: 340px; }
  .modal-content { width: 92%; }
}

/* Console */
.console-section { margin-top: 1em; }
.console-section #console-toggle { margin-bottom: 0.5em; }
.console-container {
	border: 1px solid var(--border);
	border-radius: 6px;
	overflow: hidden;
	background: #0d0d0d;
}
.console-toolbar {
	display: flex;
	align-items: center;
	gap: 0.5em;
	padding: 0.4em 0.7em;
	border-bottom: 1px solid var(--border);
	background: var(--bg-elevated);
}
#terminal { padding: 0.3em; }
html.dark .console-container { background: #0d0d0d; }
html:not(.dark) .console-container { background: #1a1a1a; }

.stats-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.5em; }
.stats-header h3 { margin:0; }
.chart-range-btns { display:flex; gap:0.3em; flex-wrap:wrap; }
.chart-range-btns .btn { font-size:0.75em; padding:0.25em 0.6em; }
.chart-range-btns .btn-active { background:var(--bg-elevated); border-color:var(--accent); color:var(--text); }

.stats-gauges { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:0.5em 1.5em; margin-bottom:0.75em; }
.stat-gauge { min-width:0; }
.stat-gauge-label { font-size:0.65em; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.04em; }
.stat-gauge-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:0.15em; }
.stat-gauge-row { display:flex; align-items:center; gap:0.4em; }
.stat-gauge-bar { width:100%; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.stat-gauge-fill { height:100%; border-radius:3px; transition:width 0.5s ease; }
.stat-gauge-cpu { background:var(--orange); }
.stat-gauge-mem { background:var(--green); }
.stat-gauge-disk { background:var(--link); }
.stat-gauge-value { font-size:0.8em; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.stat-gauge-detail { font-size:0.8em; color:var(--text-muted); font-weight:400; }
.stat-gauge-net { font-size:0.8em; font-weight:400; color:var(--text); line-height:1.4; word-break:break-word; }

.chart-section { margin-top:0.6em; }
.chart-title { font-size:0.72em; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.03em; margin-bottom:0.2em; }
.chart-svg { width:100%; height:100px; display:block; background:var(--bg); border-radius:4px; }
.live-badge {
  display: inline-block;
  margin-left: 0.5em;
  padding: 0.1em 0.4em;
  font-size: 0.7em;
  font-weight: 600;
  color: var(--green);
  background: rgba(45, 122, 58, 0.1);
  border-radius: 3px;
  animation: blink-pulse 1.5s ease-in-out infinite;
}
</style>
{{end}}

{{define "nav"}}
{{if .DevMock}}<div class="dev-mock-bar">⚠ Dev Mock Mode — All SSH operations are simulated</div>{{end}}
<div class="top-nav">
  <a href="." class="logo">Dockify</a>
  <div class="nav-links">
    <a href=".">Dashboard</a>
    <a href="servers">Servers</a>
    <a href="apps">Apps</a>
    <a href="settings">Settings</a>
    <a href="about">About</a>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-toggle" title="Toggle theme">☀</button>
  </div>
</div>
{{end}}

{{define "scripts"}}
<script>
(function() {
  var t = localStorage.getItem('dockify-theme');
  if (t === 'dark') {
    document.documentElement.classList.add('dark');
    document.getElementById('theme-toggle').textContent = '☾';
  }
})();
function toggleTheme() {
  var h = document.documentElement;
  var b = document.getElementById('theme-toggle');
  h.classList.toggle('dark');
  var isDark = h.classList.contains('dark');
  b.textContent = isDark ? '☾' : '☀';
  localStorage.setItem('dockify-theme', isDark ? 'dark' : 'light');
}
document.querySelectorAll('time[datetime]').forEach(function(el){
  var d = new Date(el.getAttribute('datetime'));
  if (isNaN(d)) return;
  var p=function(n){return String(n).padStart(2,'0');};
  el.textContent = d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
});

/* SSH Console */
var term = null;
var ws = null;

function toggleConsole() {
	var container = document.getElementById('console-container');
	if (container.style.display === 'none') {
		container.style.display = 'block';
		document.getElementById('console-toggle').textContent = 'Close Console';
		connectConsole();
	} else {
		container.style.display = 'none';
		document.getElementById('console-toggle').textContent = 'Console';
		disconnectConsole();
	}
}

function connectConsole() {
	var btn = document.getElementById('console-toggle');
	var serverId = btn.getAttribute('data-server-id');
	if (!serverId) return;
	var base = document.querySelector('base').getAttribute('href') || '/';
	var proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
	var host = window.location.host;

	term = new Terminal({
		fontFamily: '"Berkeley Mono", "IBM Plex Mono", ui-monospace, monospace',
		fontSize: 13,
		lineHeight: 1.35,
		cursorBlink: true,
		cursorStyle: 'block',
		theme: {
			background: '#0d0d0d',
			foreground: '#cfcecd',
			cursor: '#cfcecd',
			selectionBackground: '#3a3a3a',
			black: '#0d0d0d',
			red: '#b33a3a',
			green: '#3d8b4a',
			yellow: '#b8942e',
			blue: '#4a7bbb',
			magenta: '#b84a7b',
			cyan: '#4ab8b8',
			white: '#cfcecd',
			brightBlack: '#555',
			brightRed: '#b33a3a',
			brightGreen: '#3d8b4a',
			brightYellow: '#b8942e',
			brightBlue: '#4a7bbb',
			brightMagenta: '#b84a7b',
			brightCyan: '#4ab8b8',
			brightWhite: '#cfcecd'
		}
	});

	var fitAddon = new FitAddon.FitAddon();
	term.loadAddon(fitAddon);
	term.open(document.getElementById('terminal'));

	// Delay fit until terminal is visible and rendered
	setTimeout(function() { fitAddon.fit(); }, 50);

	ws = new WebSocket(proto + '//' + host + base + 'api/servers/' + serverId + '/console');
	ws.binaryType = 'arraybuffer';

	ws.onopen = function() {
		document.getElementById('console-status').textContent = 'Connected';
		document.getElementById('console-status').className = 'badge badge-online';
		term.focus();
		var enc = new TextEncoder();
		var dims = fitAddon.proposeDimensions();
		if (dims) {
			ws.send(enc.encode(JSON.stringify({resize: {width: dims.cols, height: dims.rows}})));
		}
	};

	ws.onmessage = function(evt) {
		var data = evt.data;
		if (data instanceof ArrayBuffer) {
			term.write(new Uint8Array(data));
		} else {
			term.write(data);
		}
	};
	ws.onclose = function() {
		document.getElementById('console-status').textContent = 'Disconnected';
		document.getElementById('console-status').className = 'badge badge-offline';
		if (term) {
			term.write('\r\n\x1b[31mSession ended.\x1b[0m\r\n');
		}
	};

	term.onData(function(data) {
		if (ws && ws.readyState === WebSocket.OPEN) {
			ws.send(data);
		}
	});

	window._consoleResizeHandler = function() {
		if (!fitAddon || !ws || ws.readyState !== WebSocket.OPEN) return;
		fitAddon.fit();
		var dims = fitAddon.proposeDimensions();
		if (dims) {
			ws.send(enc.encode(JSON.stringify({resize: {width: dims.cols, height: dims.rows}})));
		}
	};
	window.addEventListener('resize', window._consoleResizeHandler);
}

function disconnectConsole() {
	if (window._consoleResizeHandler) {
		window.removeEventListener('resize', window._consoleResizeHandler);
		window._consoleResizeHandler = null;
	}
	if (ws) {
		ws.close();
		ws = null;
	}
	if (term) {
		term.dispose();
		term = null;
	}
	document.getElementById('console-status').textContent = 'Disconnected';
	document.getElementById('console-status').className = 'badge badge-offline';
}
</script>
{{end}}
