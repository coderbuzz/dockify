{{define "head"}}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<base href="{{.BasePath}}">
<title>{{.Title}} - Dockify</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<style>
:root {
  --bg: #0d0d0d;
  --bg-elevated: #141414;
  --bg-card: #1a1a1a;
  --border: #2a2a2a;
  --border-hover: #3a3a3a;
  --text: #cfcecd;
  --text-muted: #888;
  --text-dim: #555;
  --accent: #7c7c7c;
  --accent-hover: #aaa;
  --green: #3d8b4a;
  --red: #b33a3a;
  --yellow: #b8942e;
  --orange: #b8702e;
  --blue: #4a7bbb;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--text); text-decoration: none; }
a:hover { color: #fff; }
h1, h2, h3, h4 { font-weight: 500; margin: 0 0 0.5em; }
h1 { font-size: 1.4em; }
h2 { font-size: 1.15em; color: var(--text-muted); font-weight: 400; }
hgroup p { color: var(--text-muted); font-size: 0.85em; margin: -0.3em 0 1em; }

/* Nav */
.top-nav {
  display: flex;
  align-items: center;
  gap: 1.5em;
  padding: 0.6em 1.5em;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
}
.top-nav .logo { font-weight: 600; font-size: 1em; color: var(--text); }
.top-nav .nav-links { display: flex; gap: 0.2em; margin-left: auto; }
.top-nav .nav-links a {
  padding: 0.3em 0.7em;
  border-radius: 4px;
  font-size: 0.85em;
  color: var(--text-muted);
  transition: color 0.15s, background 0.15s;
}
.top-nav .nav-links a:hover { color: #fff; background: var(--border); }

/* Container */
.container { max-width: 960px; margin: 0 auto; padding: 1.2em 1.5em; }

/* Cards */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1em 1.2em;
  margin-bottom: 0.8em;
}
.card h3 { font-size: 0.85em; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.6em; }

/* Grid */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.8em; }

/* Buttons */
.btn, [role=button], button {
  display: inline-block;
  padding: 0.35em 0.8em;
  font-size: 0.85em;
  font-family: inherit;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  line-height: 1.4;
  text-decoration: none;
}
.btn:hover, [role=button]:hover, button:hover { border-color: var(--border-hover); color: #fff; }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text-muted); }
.btn-ghost:hover { color: #fff; }
.btn-red { color: var(--red); }
.btn-red:hover { border-color: var(--red); color: var(--red); }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
thead th {
  text-align: left;
  padding: 0.5em 0.6em;
  border-bottom: 1px solid var(--border);
  color: var(--text-muted);
  font-weight: 500;
  font-size: 0.8em;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
tbody td { padding: 0.45em 0.6em; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:hover td { background: rgba(255,255,255,0.02); }
table a { color: var(--text); }
table a:hover { color: #fff; }

/* Form elements */
input, textarea, select {
  font-family: inherit;
  font-size: 0.85em;
  padding: 0.4em 0.6em;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  width: 100%;
  outline: none;
  transition: border-color 0.15s;
}
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 80px; }
label { font-size: 0.8em; color: var(--text-muted); margin-bottom: 0.3em; display: block; }
fieldset { border: none; padding: 0; margin: 0 0 0.8em; }
legend { font-size: 0.8em; color: var(--text-muted); margin-bottom: 0.5em; text-transform: uppercase; letter-spacing: 0.03em; }

/* Badges */
.badge {
  display: inline-block;
  padding: 0.08em 0.5em;
  border-radius: 3px;
  font-size: 0.75em;
  font-weight: 500;
  text-transform: lowercase;
}
.badge-online, .badge-running, .badge-success { background: var(--green); color: #fff; }
.badge-offline, .badge-error, .badge-failed { background: var(--red); color: #fff; }
.badge-pending, .badge-created { background: var(--text-dim); color: var(--text); }
.badge-initializing, .badge-deploying { background: var(--yellow); color: #000; }
.badge-stopped { background: var(--orange); color: #fff; }

/* Stats cards */
.stat { text-align: center; padding: 0.8em; }
.stat h2 { font-size: 1.6em; font-weight: 600; margin: 0; color: #fff; }
.stat small { font-size: 0.75em; color: var(--text-muted); }

/* Breadcrumb */
.breadcrumb { display: flex; gap: 0.4em; font-size: 0.85em; color: var(--text-muted); margin-bottom: 0.8em; }
.breadcrumb a { color: var(--text-muted); }
.breadcrumb a:hover { color: #fff; }

/* Role group */
.btn-group { display: flex; gap: 0.5em; flex-wrap: wrap; margin: 1em 0; }

/* Code blocks */
pre, code { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 0.85em; }
pre { background: var(--bg); border: 1px solid var(--border); padding: 0.8em; border-radius: 4px; overflow-x: auto; line-height: 1.4; }

/* Log viewer */
.log-container { margin: 1em 0; }
.log-container .log-toolbar { display: flex; gap: 0.4em; margin-bottom: 0.5em; }
.log-container .log-content { background: var(--bg); border: 1px solid var(--border); padding: 0.6em; border-radius: 4px; max-height: 400px; overflow: auto; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.78em; line-height: 1.4; color: var(--text-muted); }

/* Empty state */
.empty-state { text-align: center; padding: 2em 1em; color: var(--text-muted); }
.empty-state p { margin-bottom: 0.8em; }

/* Inline form */
form.inline { display: inline; }

@media (max-width: 600px) {
  .container { padding: 0.8em 1em; }
  .grid { grid-template-columns: 1fr; }
}
</style>
{{end}}

{{define "nav"}}
<div class="top-nav">
  <a href="." class="logo">Dockify</a>
  <div class="nav-links">
    <a href=".">Dashboard</a>
    <a href="servers">Servers</a>
    <a href="apps">Apps</a>
  </div>
</div>
{{end}}

{{define "scripts"}}
<script>
  document.body.addEventListener('htmx:afterRequest', function(evt) {
    if (evt.detail.xhr.status === 200 && evt.detail.elt.tagName === 'FORM') {
      evt.detail.elt.reset();
    }
  });
</script>
{{end}}
