{{define "head"}}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<base href="{{.BasePath}}">
<title>{{.Title}} - Dockify</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<style>
  [role=button].secondary-outline { background: transparent; border: 1px solid var(--pico-color-grey-500); }
  .status-badge { display: inline-block; padding: 0.1em 0.6em; border-radius: 1em; font-size: 0.8em; font-weight: bold; }
  .status-online { background: var(--pico-color-green-500); color: #fff; }
  .status-offline { background: var(--pico-color-red-500); color: #fff; }
  .status-pending { background: var(--pico-color-grey-500); color: #fff; }
  .status-initializing { background: var(--pico-color-yellow-500); color: #000; }
  .status-error { background: var(--pico-color-red-700); color: #fff; }
  .status-created { background: var(--pico-color-grey-500); color: #fff; }
  .status-deploying { background: var(--pico-color-yellow-500); color: #000; }
  .status-running { background: var(--pico-color-green-500); color: #fff; }
  .status-stopped { background: var(--pico-color-orange-500); color: #fff; }
  .status-failed { background: var(--pico-color-red-700); color: #fff; }
  .status-success { background: var(--pico-color-green-500); color: #fff; }
</style>
{{end}}

{{define "nav"}}
<header class="container">
  <nav>
    <ul>
      <li><strong><a href="." style="text-decoration:none">Dockify</a></strong></li>
    </ul>
    <ul>
      <li><a href="." role="button" class="outline contrast" style="font-size:0.85em">Dashboard</a></li>
      <li><a href="servers" role="button" class="outline contrast" style="font-size:0.85em">Servers</a></li>
      <li><a href="apps" role="button" class="outline contrast" style="font-size:0.85em">Apps</a></li>
    </ul>
  </nav>
</header>
{{end}}

{{define "scripts"}}
<script>
  document.body.addEventListener('htmx:afterRequest', function(evt) {
    if (evt.detail.xhr.status === 200 && evt.detail.elt.tagName === 'FORM') {
      evt.detail.elt.reset();
    }
  });
</script>
{{end}}
