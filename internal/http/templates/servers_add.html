<!doctype html>
<html lang="en">
<head>{{template "head" .}}</head>
<body>
{{template "nav" .}}
<div class="container">
  <hgroup>
    <h1>Add Server</h1>
    <p>Register a new VM in the pool</p>
  </hgroup>

  {{if .Error}}
  <div class="card" style="color:var(--red)">{{.Error}}</div>
  {{end}}

  <form method="POST" action="servers/add">
    <fieldset>
      <label>Name<input type="text" name="name" placeholder="my-worker-01" required autofocus></label>
      <label>Host<input type="text" name="host" placeholder="192.168.1.10" required></label>
      <div class="grid">
        <label>Port<input type="number" name="port" value="22" placeholder="22"></label>
        <label>User<input type="text" name="user" value="root" placeholder="root"></label>
      </div>
      <label>SSH Private Key<textarea name="ssh_key" rows="8" placeholder="-----BEGIN OPENSSH PRIVATE KEY-----&#10;b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW&#10;...&#10;-----END OPENSSH PRIVATE KEY-----" required></textarea><small>Paste the full private key content (not a file path)</small></label>
    </fieldset>
    <button type="submit" class="btn btn-primary">Add Server</button>
  </form>
</div>
{{template "scripts" .}}
</body>
</html>
