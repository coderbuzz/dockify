<!doctype html>
<html lang="en">
<head>{{template "head" .}}</head>
<body>
{{template "nav" .}}
<div class="container">
  {{if .Flash}}<div class="flash-banner">{{.Flash}}</div>{{end}}
  <hgroup>
    <h1>Apps</h1>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1em">
      <a href="apps/add" class="btn btn-primary">Deploy App</a>
      <form method="POST" action="apps/redeploy-all" style="margin:0"
            onsubmit="return confirm('Redeploy all running apps?')">
        <button type="submit" class="btn btn-red">Redeploy All</button>
      </form>
    </div>
  </hgroup>

  {{template "apps_list" .}}
</div>
{{template "scripts" .}}
</body>
</html>
