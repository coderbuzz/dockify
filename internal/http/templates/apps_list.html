{{define "apps_list"}}
{{if .Apps}}
<table style="font-size:0.85em">
  <thead>
    <tr><th>Name</th><th>Domain</th><th>Port</th><th>Status</th><th>Git</th><th></th></tr>
  </thead>
  <tbody>
    {{range .Apps}}
    <tr>
      <td style="white-space:nowrap"><a href="apps/{{.ID}}">{{.Name}}</a></td>
      <td style="white-space:nowrap">{{.Domain}}</td>
      <td>{{.Port}}</td>
      <td><span class="badge badge-{{.Status}}">{{.Status}}</span></td>
      <td>{{if .GitRepo}}{{.GitRepo}}@{{.GitBranch}}{{else}}-{{end}}</td>
      <td style="width:1%;white-space:nowrap">
        <form method="POST" action="apps/{{.ID}}/undeploy" style="display:inline"
              onsubmit="return confirm('Undeploy {{.Name}}? This will stop and remove the app.')">
          <button type="submit" class="btn btn-ghost btn-red">Undeploy</button>
        </form>
      </td>
    </tr>
    {{end}}
  </tbody>
</table>
{{else}}
<div class="empty-state">
  <p>No apps deployed yet.</p>
  <a href="apps/add" class="btn btn-primary">Deploy Your First App</a>
</div>
{{end}}
{{end}}
